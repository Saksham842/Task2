version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: leads_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: leads_db
      MYSQL_USER: leads_user
      MYSQL_PASSWORD: leadspassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: leads_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 23615
      DB_PASSWORD: leadspassword
      DB_NAME: leads_db
      JWT_SECRET: supersecretjwtkey12345
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: leads_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mysql_data:
